<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>2048 クローン</title>
    <style>
      :root {
        --bg0: #f6efe4;
        --bg1: #e8dfd2;
        --text: #5c534a;
        --muted: rgba(92, 83, 74, 0.72);
        --board-edge: #9d8b7c;
        --board: #bbada0;
        --empty: rgba(238, 228, 218, 0.45);
        --tile: #eee4da;
        --tile-text: #776e65;
        --accent: #c9723a;
        --accent2: #8f7a66;
        --gap: 12px;
        --cell: 88px;
        --radius: 16px;
        --shadow: 0 18px 50px rgba(62, 55, 48, 0.18);
        --shadow-soft: 0 8px 22px rgba(62, 55, 48, 0.12);
        --slide-ms: 220ms;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN",
          "Noto Sans JP", "Yu Gothic UI", "Yu Gothic", "Meiryo", Arial, "Apple Color Emoji", "Segoe UI Emoji";
        color: var(--text);
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 28px 20px;
        background:
          radial-gradient(900px 520px at 10% -10%, rgba(255, 255, 255, 0.92), transparent 60%),
          radial-gradient(700px 500px at 90% 110%, rgba(201, 114, 58, 0.12), transparent 55%),
          linear-gradient(165deg, var(--bg0), var(--bg1));
      }

      .app {
        width: min(520px, 92vw);
        display: grid;
        gap: 18px;
      }

      .top {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 14px;
        flex-wrap: wrap;
      }

      .brand {
        display: grid;
        gap: 8px;
      }

      .brand h1 {
        margin: 0;
        font-size: 44px;
        letter-spacing: 1px;
        line-height: 1;
        font-weight: 900;
        background: linear-gradient(180deg, #6b5e5a 0%, #b08f6a 55%, #e3b885 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        filter: drop-shadow(0 2px 0 rgba(255, 255, 255, 0.55));
      }

      .hint {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.55;
        max-width: 52ch;
      }

      .hud {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .pill {
        position: relative;
        background: linear-gradient(180deg, #a1856e, #8f7a66);
        color: #fff;
        padding: 10px 12px;
        border-radius: 14px;
        min-width: 118px;
        text-align: center;
        box-shadow: var(--shadow-soft), inset 0 1px 0 rgba(255, 255, 255, 0.22);
        user-select: none;
        border: 1px solid rgba(62, 55, 48, 0.14);
      }

      .pill::after {
        content: "";
        position: absolute;
        inset: 2px;
        border-radius: 12px;
        pointer-events: none;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
      }

      .pill.best .value {
        color: #fff7e0;
        text-shadow: 0 1px 0 rgba(0, 0, 0, 0.15);
      }

      .pill .label {
        font-size: 11px;
        letter-spacing: 0.04em;
        opacity: 0.9;
        line-height: 1.1;
        text-transform: uppercase;
      }

      .pill .value {
        font-size: 22px;
        font-weight: 800;
        letter-spacing: 0.5px;
        line-height: 1.2;
        margin-top: 2px;
        font-variant-numeric: tabular-nums;
      }

      .pill.score-bump .value {
        animation: score-pop 220ms ease-out both;
      }

      @keyframes score-pop {
        0% {
          transform: scale(1);
        }
        55% {
          transform: scale(1.12);
        }
        100% {
          transform: scale(1);
        }
      }

      .btn-icon {
        min-width: 48px;
        padding-left: 12px;
        padding-right: 12px;
        font-size: 18px;
        line-height: 1;
      }

      button {
        appearance: none;
        border: 0;
        background: linear-gradient(180deg, #b89275, #8f7a66);
        color: #fff;
        font-weight: 800;
        padding: 12px 14px;
        border-radius: 14px;
        cursor: pointer;
        box-shadow: var(--shadow-soft), inset 0 1px 0 rgba(255, 255, 255, 0.18);
        border: 1px solid rgba(62, 55, 48, 0.14);
        transition: transform 120ms ease, filter 120ms ease, box-shadow 120ms ease;
      }

      button:hover {
        filter: brightness(1.05);
        box-shadow: 0 12px 28px rgba(62, 55, 48, 0.16), inset 0 1px 0 rgba(255, 255, 255, 0.2);
      }

      button:active {
        transform: translateY(1px);
      }

      button.muted {
        opacity: 0.88;
        filter: saturate(0.85);
      }

      .boardWrap {
        position: relative;
        border-radius: var(--radius);
        padding: var(--gap);
        user-select: none;
        /* スマホで盤面上スワイプ時にページが動かないようにする */
        touch-action: none;
        outline: none;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.34), rgba(255, 255, 255, 0)),
          linear-gradient(145deg, #d9cec3, var(--board));
        box-shadow:
          var(--shadow),
          inset 0 1px 0 rgba(255, 255, 255, 0.35),
          inset 0 -1px 0 rgba(62, 55, 48, 0.08);
        border: 1px solid rgba(90, 78, 68, 0.14);
      }

      .boardWrap:focus-visible {
        box-shadow:
          var(--shadow),
          0 0 0 3px rgba(201, 114, 58, 0.35),
          inset 0 1px 0 rgba(255, 255, 255, 0.35);
      }

      .board {
        position: relative;
        width: calc(var(--cell) * 4 + var(--gap) * 3);
        height: calc(var(--cell) * 4 + var(--gap) * 3);
      }

      .grid {
        position: absolute;
        inset: 0;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(4, 1fr);
        gap: var(--gap);
        pointer-events: none;
      }

      .cell {
        border-radius: 12px;
        background: var(--empty);
        box-shadow: inset 0 3px 8px rgba(62, 55, 48, 0.12), inset 0 -1px 0 rgba(255, 255, 255, 0.35);
      }

      .tiles {
        position: absolute;
        inset: 0;
      }

      .tile {
        position: absolute;
        width: var(--cell);
        height: var(--cell);
        border-radius: 12px;
        display: grid;
        place-items: center;
        font-weight: 900;
        font-size: 34px;
        color: var(--tile-text);
        background: var(--tile);
        box-shadow:
          0 14px 26px rgba(62, 55, 48, 0.22),
          0 2px 0 rgba(255, 255, 255, 0.35) inset,
          0 -6px 16px rgba(62, 55, 48, 0.08) inset;
        border: 1px solid rgba(255, 255, 255, 0.22);
        /* 通常は即時反映。スライド中だけ .slide-trans で滑らかに動かす */
        transition: transform 0ms linear;
        will-change: transform;
      }

      .tile.slide-trans {
        transition: transform var(--slide-ms) cubic-bezier(0.25, 0.82, 0.12, 1);
      }

      .tile.small {
        font-size: 30px;
      }
      .tile.smaller {
        font-size: 26px;
      }
      .tile.tiny {
        font-size: 22px;
      }

      .tile.spawn {
        animation: pop-in 150ms cubic-bezier(0.2, 0.95, 0.25, 1) both;
      }

      .tile.merge {
        animation: merge-bounce 200ms cubic-bezier(0.2, 1.1, 0.25, 1) both;
        filter: drop-shadow(0 0 12px rgba(237, 200, 88, 0.35));
      }

      @keyframes pop-in {
        from {
          transform: var(--pos) scale(0.52);
          filter: brightness(1.06) saturate(1.05);
        }
        to {
          transform: var(--pos) scale(1);
          filter: none;
        }
      }

      @keyframes merge-bounce {
        0% {
          transform: var(--pos) scale(0.94);
        }
        45% {
          transform: var(--pos) scale(1.1);
        }
        100% {
          transform: var(--pos) scale(1);
        }
      }

      .overlay {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(38, 32, 28, 0.35);
        border-radius: var(--radius);
        opacity: 0;
        pointer-events: none;
        transition: opacity 200ms ease;
        backdrop-filter: blur(5px);
      }

      .overlay.show {
        opacity: 1;
        pointer-events: auto;
      }

      /* ゲームオーバーより手前に出す（両方ある場合はオーバーレイ側を優先） */
      .overlay-start {
        z-index: 2;
      }

      .overlay-gameover {
        z-index: 3;
      }

      .panel {
        text-align: center;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(249, 244, 236, 0.92));
        border: 1px solid rgba(143, 122, 102, 0.22);
        box-shadow: var(--shadow);
        padding: 22px 18px;
        border-radius: 16px;
        width: min(360px, 88%);
      }

      .panel h2 {
        margin: 0 0 8px;
        font-size: 28px;
        font-weight: 900;
        letter-spacing: 0.02em;
        color: #5c534a;
      }

      .panel p {
        margin: 0 0 14px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }

      .footer {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.55;
        margin-top: 6px;
      }

      @media (max-width: 430px) {
        :root {
          --gap: 10px;
          --cell: 72px;
        }
        .brand h1 {
          font-size: 38px;
        }
        .pill {
          min-width: 108px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="top">
        <div class="brand">
          <h1>2048</h1>
          <p class="hint">PCは矢印キー、スマホは盤面をスワイプして操作。同じ数字を合体させて大きくしよう。</p>
        </div>
        <div class="hud">
          <div class="pill score" id="pillScore" aria-label="スコア">
            <div class="label">スコア</div>
            <div class="value" id="score">0</div>
          </div>
          <div class="pill best" aria-label="ベスト（この端末）">
            <div class="label">ベスト</div>
            <div class="value" id="best">0</div>
          </div>
          <button id="mute" type="button" class="btn-icon" title="効果音のオン/オフ" aria-pressed="false" aria-label="効果音">🔊</button>
          <button id="reset" type="button">リセット</button>
        </div>
      </section>

      <section class="boardWrap" id="boardWrap" tabindex="0" aria-label="2048 盤面">
        <div class="board" id="board">
          <div class="grid" id="grid" aria-hidden="true"></div>
          <div class="tiles" id="tiles" aria-hidden="true"></div>
        </div>
        <div class="overlay overlay-start show" id="startOverlay" aria-modal="true" role="dialog" aria-labelledby="startTitle" aria-describedby="startText">
          <div class="panel">
            <h2 id="startTitle">2048</h2>
            <p id="startText">iPhone / iPad の Safari などでは、効果音のために最初にボタンをタップして音声を有効にしてください。</p>
            <button id="gameStart" type="button">ゲーム開始</button>
          </div>
        </div>
        <div class="overlay overlay-gameover" id="overlay" aria-live="polite">
          <div class="panel">
            <h2 id="overlayTitle">ゲームオーバー</h2>
            <p id="overlayText">もう動かせません。リセットしてもう一度挑戦しましょう。</p>
            <button id="retry" type="button">もう一度</button>
            <div class="footer">ヒント: PCは盤面をクリックしてから矢印キー。スマホは盤面上で上下左右にスワイプできます。</div>
          </div>
        </div>
      </section>
    </main>

    <script>
      (() => {
        "use strict";

        const SIZE = 4;
        const SLIDE_MS = 220;
        const STORAGE_KEY_BEST = "clone2048_best";
        const STORAGE_KEY_MUTED = "clone2048_muted";

        /** 各タイルに付与する増分ID（アニメでサイド追跡） */
        let nextTileId = 1;

        function randChoice2or4() {
          // 2048準拠: 90%で2、10%で4
          return Math.random() < 0.9 ? 2 : 4;
        }

        /** 空の盤面（セルは null または { v, id }） */
        function emptyCellBoard() {
          return Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
        }

        function cellValue(board, r, c) {
          const t = board[r][c];
          return t ? t.v : 0;
        }

        /** 数字だけ比較（移動が実際に起きたか） */
        function boardValuesEqual(a, b) {
          for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
              if (cellValue(a, r, c) !== cellValue(b, r, c)) return false;
            }
          }
          return true;
        }

        function getEmptyCells(board) {
          const cells = [];
          for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
              if (!board[r][c]) cells.push({ r, c });
            }
          }
          return cells;
        }

        function canMove(board) {
          if (getEmptyCells(board).length > 0) return true;
          for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
              const v = cellValue(board, r, c);
              if (r + 1 < SIZE && cellValue(board, r + 1, c) === v) return true;
              if (c + 1 < SIZE && cellValue(board, r, c + 1) === v) return true;
            }
          }
          return false;
        }

        function addRandomTile(board) {
          const empties = getEmptyCells(board);
          if (empties.length === 0) return null;
          const pick = empties[Math.floor(Math.random() * empties.length)];
          const value = randChoice2or4();
          const id = nextTileId++;
          board[pick.r][pick.c] = { v: value, id };
          return { r: pick.r, c: pick.c, value };
        }

        /**
         * 1行を左にスライド＆合体（行座標 r 固定）。セルは { v, id } | null
         * @returns {{ line: (object|null)[], gained: number, moves: object[], mergedCells: {r:number,c:number,v:number}[] }}
         */
        function slideRowLeft(r, row) {
          const items = [];
          for (let c = 0; c < SIZE; c++) {
            if (row[c]) items.push({ tile: row[c], c });
          }
          const line = [null, null, null, null];
          const moves = [];
          const mergedCells = [];
          let gained = 0;
          let write = 0;
          let i = 0;
          while (i < items.length) {
            const a = items[i];
            if (i + 1 < items.length && items[i + 1].tile.v === a.tile.v) {
              const b = items[i + 1];
              const nv = a.tile.v * 2;
              const newId = nextTileId++;
              const merged = { v: nv, id: newId };
              line[write] = merged;
              gained += nv;
              mergedCells.push({ r, c: write, v: nv });
              moves.push({ id: a.tile.id, from: { r, c: a.c }, to: { r, c: write }, v: a.tile.v });
              moves.push({ id: b.tile.id, from: { r, c: b.c }, to: { r, c: write }, v: b.tile.v });
              i += 2;
              write++;
            } else {
              line[write] = a.tile;
              if (a.c !== write) {
                moves.push({ id: a.tile.id, from: { r, c: a.c }, to: { r, c: write }, v: a.tile.v });
              }
              i++;
              write++;
            }
          }
          return { line, gained, moves, mergedCells };
        }

        /** 1行を右へ（列が大きい方へ） */
        function slideRowRight(r, row) {
          const items = [];
          for (let c = SIZE - 1; c >= 0; c--) {
            if (row[c]) items.push({ tile: row[c], c });
          }
          const line = [null, null, null, null];
          const moves = [];
          const mergedCells = [];
          let gained = 0;
          let write = 0;
          let i = 0;
          while (i < items.length) {
            const a = items[i];
            if (i + 1 < items.length && items[i + 1].tile.v === a.tile.v) {
              const b = items[i + 1];
              const nv = a.tile.v * 2;
              const newId = nextTileId++;
              const merged = { v: nv, id: newId };
              const toC = SIZE - 1 - write;
              line[toC] = merged;
              gained += nv;
              mergedCells.push({ r, c: toC, v: nv });
              moves.push({ id: a.tile.id, from: { r, c: a.c }, to: { r, c: toC }, v: a.tile.v });
              moves.push({ id: b.tile.id, from: { r, c: b.c }, to: { r, c: toC }, v: b.tile.v });
              i += 2;
              write++;
            } else {
              const toC = SIZE - 1 - write;
              line[toC] = a.tile;
              if (a.c !== toC) {
                moves.push({ id: a.tile.id, from: { r, c: a.c }, to: { r, c: toC }, v: a.tile.v });
              }
              i++;
              write++;
            }
          }
          return { line, gained, moves, mergedCells };
        }

        /** 列を上へ */
        function slideColUp(c, col) {
          const items = [];
          for (let r = 0; r < SIZE; r++) {
            if (col[r]) items.push({ tile: col[r], r });
          }
          const line = [null, null, null, null];
          const moves = [];
          const mergedCells = [];
          let gained = 0;
          let write = 0;
          let i = 0;
          while (i < items.length) {
            const a = items[i];
            if (i + 1 < items.length && items[i + 1].tile.v === a.tile.v) {
              const b = items[i + 1];
              const nv = a.tile.v * 2;
              const newId = nextTileId++;
              const merged = { v: nv, id: newId };
              line[write] = merged;
              gained += nv;
              mergedCells.push({ r: write, c, v: nv });
              moves.push({ id: a.tile.id, from: { r: a.r, c }, to: { r: write, c }, v: a.tile.v });
              moves.push({ id: b.tile.id, from: { r: b.r, c }, to: { r: write, c }, v: b.tile.v });
              i += 2;
              write++;
            } else {
              line[write] = a.tile;
              if (a.r !== write) {
                moves.push({ id: a.tile.id, from: { r: a.r, c }, to: { r: write, c }, v: a.tile.v });
              }
              i++;
              write++;
            }
          }
          return { line, gained, moves, mergedCells };
        }

        /** 列を下へ */
        function slideColDown(c, col) {
          const items = [];
          for (let r = SIZE - 1; r >= 0; r--) {
            if (col[r]) items.push({ tile: col[r], r });
          }
          const line = [null, null, null, null];
          const moves = [];
          const mergedCells = [];
          let gained = 0;
          let write = 0;
          let i = 0;
          while (i < items.length) {
            const a = items[i];
            if (i + 1 < items.length && items[i + 1].tile.v === a.tile.v) {
              const b = items[i + 1];
              const nv = a.tile.v * 2;
              const newId = nextTileId++;
              const merged = { v: nv, id: newId };
              const toR = SIZE - 1 - write;
              line[toR] = merged;
              gained += nv;
              mergedCells.push({ r: toR, c, v: nv });
              moves.push({ id: a.tile.id, from: { r: a.r, c }, to: { r: toR, c }, v: a.tile.v });
              moves.push({ id: b.tile.id, from: { r: b.r, c }, to: { r: toR, c }, v: b.tile.v });
              i += 2;
              write++;
            } else {
              const toR = SIZE - 1 - write;
              line[toR] = a.tile;
              if (a.r !== toR) {
                moves.push({ id: a.tile.id, from: { r: a.r, c }, to: { r: toR, c }, v: a.tile.v });
              }
              i++;
              write++;
            }
          }
          return { line, gained, moves, mergedCells };
        }

        /**
         * @param {ReturnType<emptyCellBoard>} board
         * @param {"left"|"right"|"up"|"down"} direction
         */
        function computeMove(board, direction) {
          const next = emptyCellBoard();
          let gained = 0;
          /** @type {{ id: number, from: {r:number,c:number}, to: {r:number,c:number}, v: number }[]} */
          const movements = [];
          /** @type {{ r:number,c:number,v:number }[]} */
          const mergedCells = [];

          if (direction === "left") {
            for (let r = 0; r < SIZE; r++) {
              const res = slideRowLeft(r, board[r]);
              next[r] = res.line;
              gained += res.gained;
              movements.push(...res.moves);
              mergedCells.push(...res.mergedCells);
            }
          } else if (direction === "right") {
            for (let r = 0; r < SIZE; r++) {
              const res = slideRowRight(r, board[r]);
              next[r] = res.line;
              gained += res.gained;
              movements.push(...res.moves);
              mergedCells.push(...res.mergedCells);
            }
          } else if (direction === "up") {
            for (let c = 0; c < SIZE; c++) {
              const col = [board[0][c], board[1][c], board[2][c], board[3][c]];
              const res = slideColUp(c, col);
              for (let r = 0; r < SIZE; r++) next[r][c] = res.line[r];
              gained += res.gained;
              movements.push(...res.moves);
              mergedCells.push(...res.mergedCells);
            }
          } else if (direction === "down") {
            for (let c = 0; c < SIZE; c++) {
              const col = [board[0][c], board[1][c], board[2][c], board[3][c]];
              const res = slideColDown(c, col);
              for (let r = 0; r < SIZE; r++) next[r][c] = res.line[r];
              gained += res.gained;
              movements.push(...res.moves);
              mergedCells.push(...res.mergedCells);
            }
          }

          const moved = !boardValuesEqual(board, next);
          return { moved, next, gained, movements, mergedCells };
        }

        function tileColor(value) {
          // ざっくり2048っぽい配色
          const map = {
            2: { bg: "#eee4da", fg: "#776e65" },
            4: { bg: "#ede0c8", fg: "#776e65" },
            8: { bg: "#f2b179", fg: "#f9f6f2" },
            16: { bg: "#f59563", fg: "#f9f6f2" },
            32: { bg: "#f67c5f", fg: "#f9f6f2" },
            64: { bg: "#f65e3b", fg: "#f9f6f2" },
            128: { bg: "#edcf72", fg: "#f9f6f2" },
            256: { bg: "#edcc61", fg: "#f9f6f2" },
            512: { bg: "#edc850", fg: "#f9f6f2" },
            1024: { bg: "#edc53f", fg: "#f9f6f2" },
            2048: { bg: "#edc22e", fg: "#f9f6f2" },
          };
          return map[value] || { bg: "#3c3a32", fg: "#f9f6f2" };
        }

        function sizeClass(value) {
          if (value >= 1024) return "tiny";
          if (value >= 128) return "smaller";
          if (value >= 64) return "small";
          return "";
        }

        function computeTranslateStyle(r, c) {
          const x = c;
          const y = r;
          // calc は文字列で組み立てる
          return `translate(calc(${x} * (var(--cell) + var(--gap))), calc(${y} * (var(--cell) + var(--gap))))`;
        }

        function keyToDir(e) {
          switch (e.key) {
            case "ArrowLeft":
              return "left";
            case "ArrowRight":
              return "right";
            case "ArrowUp":
              return "up";
            case "ArrowDown":
              return "down";
            default:
              return null;
          }
        }

        function loadBest() {
          const raw = localStorage.getItem(STORAGE_KEY_BEST);
          const n = raw ? Number(raw) : 0;
          return Number.isFinite(n) ? n : 0;
        }

        function saveBest(n) {
          localStorage.setItem(STORAGE_KEY_BEST, String(n));
        }

        function loadMuted() {
          return localStorage.getItem(STORAGE_KEY_MUTED) === "1";
        }

        function saveMuted(v) {
          localStorage.setItem(STORAGE_KEY_MUTED, v ? "1" : "0");
        }

        /** Web Audio：合体時の短い効果音（外部ファイルなし） */
        let audioCtx = null;

        function getAudioContext() {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (!AC) return null;
          if (!audioCtx) audioCtx = new AC();
          return audioCtx;
        }

        /** ブラウザの自動再生制限対策：ユーザー操作後にAudioContextをresume */
        async function resumeAudioIfNeeded() {
          const ctx = getAudioContext();
          if (!ctx) return;
          if (ctx.state === "suspended") {
            try {
              await ctx.resume();
            } catch {
              /* 失敗してもゲームは続行 */
            }
          }
        }

        /**
         * iOS WebKit 向け：本物のボタンタップの同期的なコールスタック内でノードを start し、
         * resume はその直後に発火（await しない。await するとジェスチャが切れて失敗することがある）。
         */
        function unlockAudioFromUserGesture() {
          const ctx = getAudioContext();
          if (!ctx) return;
          try {
            void ctx.resume();
          } catch {
            /* 無視 */
          }
          const t0 = ctx.currentTime;
          try {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = "sine";
            osc.frequency.setValueAtTime(300, t0);
            gain.gain.setValueAtTime(0.00008, t0);
            gain.gain.exponentialRampToValueAtTime(0.00001, t0 + 0.02);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(t0);
            osc.stop(t0 + 0.02);
          } catch {
            /* 無視 */
          }
        }

        /**
         * 合体のときの短い効果音。数字が大きいほどやや高めの音にする。
         * @param {number} tileValue 合体後の数字
         * @param {number} delayMs 開始を遅らせるミリ秒（同時に合体が複数ある場合）
         */
        function playMergeChime(tileValue, delayMs) {
          if (loadMuted()) return;
          const ctx = getAudioContext();
          if (!ctx) return;
          const startAt = ctx.currentTime + Math.max(0, delayMs) / 1000;
          const v = Math.max(2, tileValue);
          const baseHz = 220 + Math.min(380, Math.log2(v / 2) * 38);

          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = "sine";
          osc.frequency.setValueAtTime(baseHz * 1.06, startAt);
          osc.frequency.exponentialRampToValueAtTime(Math.max(120, baseHz * 0.55), startAt + 0.09);

          gain.gain.setValueAtTime(0.0001, startAt);
          gain.gain.exponentialRampToValueAtTime(0.11, startAt + 0.012);
          gain.gain.exponentialRampToValueAtTime(0.0001, startAt + 0.11);

          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(startAt);
          osc.stop(startAt + 0.12);

          // ごく短いフィルタ付きノイズで、わずかなクリック感を足す
          const noiseDur = 0.028;
          const buffer = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * noiseDur), ctx.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.35;
          const src = ctx.createBufferSource();
          src.buffer = buffer;
          const ng = ctx.createGain();
          const bp = ctx.createBiquadFilter();
          bp.type = "bandpass";
          bp.frequency.value = 1800;
          bp.Q.value = 0.7;
          ng.gain.setValueAtTime(0.0001, startAt);
          ng.gain.exponentialRampToValueAtTime(0.06, startAt + 0.004);
          ng.gain.exponentialRampToValueAtTime(0.0001, startAt + noiseDur);
          src.connect(bp);
          bp.connect(ng);
          ng.connect(ctx.destination);
          src.start(startAt);
          src.stop(startAt + noiseDur);
        }

        /** 合体したセルごとに短い音を鳴らす（少しずつずらして重なりすぎないように） */
        function playMergeSounds(mergedCells) {
          if (!mergedCells.length) return;
          mergedCells.forEach((cell, i) => {
            playMergeChime(cell.v, i * 42);
          });
        }

        // ===== UI / 状態 =====
        const elScore = document.getElementById("score");
        const elBest = document.getElementById("best");
        const elPillScore = document.getElementById("pillScore");
        const elReset = document.getElementById("reset");
        const elMute = document.getElementById("mute");
        const elRetry = document.getElementById("retry");
        const elGrid = document.getElementById("grid");
        const elTiles = document.getElementById("tiles");
        const elOverlay = document.getElementById("overlay");
        const elStartOverlay = document.getElementById("startOverlay");
        const elGameStart = document.getElementById("gameStart");
        const elWrap = document.getElementById("boardWrap");

        const state = {
          board: emptyCellBoard(),
          score: 0,
          best: loadBest(),
          over: false,
          locked: false, // 連打で表示が崩れるのを抑制
          spawnAt: null, // {r,c,value}
          mergedAt: [], // [{r,c}]
        };

        function initGrid() {
          const frag = document.createDocumentFragment();
          for (let i = 0; i < SIZE * SIZE; i++) {
            const d = document.createElement("div");
            d.className = "cell";
            frag.appendChild(d);
          }
          elGrid.appendChild(frag);
        }

        function hideOverlay() {
          elOverlay.classList.remove("show");
        }

        function showOverlayGameOver() {
          elOverlay.classList.add("show");
        }

        /**
         * @param {number} n スコア
         * @param {{ animate?: boolean }} [opts] animate: false なら数字の弾む演出なし（リセット時など）
         */
        function setScore(n, opts) {
          const animate = opts?.animate !== false;
          const prev = state.score;
          state.score = n;
          elScore.textContent = String(n);
          if (animate && n > prev && elPillScore) {
            elPillScore.classList.remove("score-bump");
            // reflow でアニメを再発火
            void elPillScore.offsetWidth;
            elPillScore.classList.add("score-bump");
            window.setTimeout(() => elPillScore && elPillScore.classList.remove("score-bump"), 240);
          }
          if (n > state.best) {
            state.best = n;
            elBest.textContent = String(n);
            saveBest(n);
          }
        }

        function resetGame() {
          nextTileId = 1;
          state.board = emptyCellBoard();
          state.over = false;
          state.locked = false;
          state.spawnAt = null;
          state.mergedAt = [];
          setScore(0, { animate: false });
          hideOverlay();

          addRandomTile(state.board);
          state.spawnAt = addRandomTile(state.board);
          renderFromBoard(state.board, { instant: true, spawnAt: state.spawnAt });
        }

        /**
         * @param {ReturnType<emptyCellBoard>} board
         * @param {{ instant?: boolean, spawnAt?: object|null, mergedAt?: {r:number,c:number}[] }} [opts]
         */
        function renderFromBoard(board, opts = {}) {
          const { instant = false, spawnAt = null, mergedAt = [] } = opts;
          elTiles.innerHTML = "";
          for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
              const cell = board[r][c];
              if (!cell) continue;
              const t = document.createElement("div");
              t.className = `tile ${sizeClass(cell.v)}`;
              t.textContent = String(cell.v);
              t.dataset.tileId = String(cell.id);
              const { bg, fg } = tileColor(cell.v);
              t.style.background = bg;
              t.style.color = fg;

              const pos = computeTranslateStyle(r, c);
              t.style.setProperty("--pos", pos);
              t.style.transform = pos;

              if (!instant) {
                if (spawnAt && spawnAt.r === r && spawnAt.c === c && spawnAt.value === cell.v) {
                  t.classList.add("spawn");
                }
                if (mergedAt.some((p) => p.r === r && p.c === c)) {
                  t.classList.add("merge");
                }
              }
              elTiles.appendChild(t);
            }
          }
        }

        function doMove(direction) {
          if (elStartOverlay.classList.contains("show")) return;
          if (state.over || state.locked) return;
          const result = computeMove(state.board, direction);
          if (!result.moved) return;
          void resumeAudioIfNeeded();

          state.locked = true;
          const prevBoard = state.board;
          state.spawnAt = null;
          state.mergedAt = [];

          renderFromBoard(prevBoard, { instant: true });
          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              for (const el of elTiles.querySelectorAll(".tile")) {
                el.classList.add("slide-trans");
              }
              for (const m of result.movements) {
                const el = elTiles.querySelector(`[data-tile-id="${m.id}"]`);
                if (!el) continue;
                const pos = computeTranslateStyle(m.to.r, m.to.c);
                el.style.setProperty("--pos", pos);
                el.style.transform = pos;
              }
            });
          });

          window.setTimeout(() => {
            state.board = result.next;
            state.mergedAt = result.mergedCells.map(({ r, c }) => ({ r, c }));
            setScore(state.score + result.gained);
            playMergeSounds(result.mergedCells);
            renderFromBoard(state.board, { instant: true, mergedAt: state.mergedAt });

            window.setTimeout(() => {
              state.spawnAt = addRandomTile(state.board);
              state.mergedAt = [];
              renderFromBoard(state.board, { instant: false, spawnAt: state.spawnAt });

              if (!canMove(state.board)) {
                state.over = true;
                showOverlayGameOver();
              }

              window.setTimeout(() => {
                state.locked = false;
              }, 180);
            }, 90);
          }, SLIDE_MS + 35);
        }

        function onKeyDown(e) {
          if (elStartOverlay.classList.contains("show")) return;
          const dir = keyToDir(e);
          if (!dir) return;
          e.preventDefault();
          doMove(dir);
        }

        /** スワイプ操作の追跡（Pointer Events でマウス・タッチ共通） */
        let swipeTrack = null;

        /**
         * 盤面スワイプとして扱ってよい入力か（ゲームオーバーオーバーレイやボタン上は除外）
         * @param {PointerEvent} e
         */
        function canTrackBoardSwipe(e) {
          const t = e.target;
          if (!(t instanceof Element)) return false;
          if (elOverlay.classList.contains("show") && elOverlay.contains(t)) return false;
          if (t.closest("button")) return false;
          return true;
        }

        /**
         * @param {PointerEvent} e
         */
        function onBoardPointerDown(e) {
          void resumeAudioIfNeeded();
          if (!canTrackBoardSwipe(e)) return;
          if (e.pointerType === "mouse" && e.button !== 0) return;
          if (!e.isPrimary) return;
          if (swipeTrack) return;
          elWrap.focus();
          swipeTrack = { id: e.pointerId, x0: e.clientX, y0: e.clientY, t0: performance.now() };
          try {
            elWrap.setPointerCapture(e.pointerId);
          } catch {
            /* 取得できない環境でもドラッグ終了判定は pointerup で行う */
          }
        }

        /**
         * @param {PointerEvent} e
         */
        function onBoardPointerUp(e) {
          if (!swipeTrack || e.pointerId !== swipeTrack.id) return;
          try {
            elWrap.releasePointerCapture(e.pointerId);
          } catch {
            /* 無視 */
          }
          const s = swipeTrack;
          swipeTrack = null;
          const dx = e.clientX - s.x0;
          const dy = e.clientY - s.y0;
          const ax = Math.abs(dx);
          const ay = Math.abs(dy);
          const minDist = 32;
          if (ax < minDist && ay < minDist) return;
          const dir = ax >= ay ? (dx < 0 ? "left" : "right") : dy < 0 ? "up" : "down";
          doMove(dir);
        }

        /** キャンセル時は追跡のみ中断 */
        function onBoardPointerCancel(e) {
          if (!swipeTrack || e.pointerId !== swipeTrack.id) return;
          try {
            elWrap.releasePointerCapture(e.pointerId);
          } catch {
            /* 無視 */
          }
          swipeTrack = null;
        }

        function onBoardLostCapture(e) {
          if (swipeTrack && swipeTrack.id === e.pointerId) swipeTrack = null;
        }

        // ===== 起動 =====
        elBest.textContent = String(state.best);
        initGrid();
        resetGame();

        function syncMuteUi() {
          const muted = loadMuted();
          elMute.classList.toggle("muted", muted);
          elMute.textContent = muted ? "🔇" : "🔊";
          elMute.setAttribute("aria-pressed", muted ? "true" : "false");
        }
        syncMuteUi();

        elMute.addEventListener("click", () => {
          saveMuted(!loadMuted());
          syncMuteUi();
          void resumeAudioIfNeeded();
        });

        elWrap.addEventListener("pointerdown", onBoardPointerDown);
        elWrap.addEventListener("pointerup", onBoardPointerUp);
        elWrap.addEventListener("pointercancel", onBoardPointerCancel);
        elWrap.addEventListener("lostpointercapture", onBoardLostCapture);

        window.addEventListener("keydown", (e) => {
          void resumeAudioIfNeeded();
          onKeyDown(e);
        }, { passive: false });
        elReset.addEventListener("click", () => {
          void resumeAudioIfNeeded();
          resetGame();
        });
        elRetry.addEventListener("click", () => {
          void resumeAudioIfNeeded();
          resetGame();
        });

        elGameStart.addEventListener("click", () => {
          unlockAudioFromUserGesture();
          elStartOverlay.classList.remove("show");
          elStartOverlay.setAttribute("aria-hidden", "true");
          elWrap.focus();
        });
      })();
    </script>
  </body>
</html>
